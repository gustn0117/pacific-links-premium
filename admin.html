<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 - 안내자료 신청 관리</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; }
.login-wrap { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.login-box { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); text-align: center; }
.login-box h1 { font-size: 20px; margin-bottom: 20px; color: #1e3a5f; }
.login-box input { padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; width: 200px; text-align: center; }
.login-box button { display: block; width: 100%; margin-top: 12px; padding: 12px; background: #1e40af; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
.login-box button:hover { background: #1e3a8a; }
.admin { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
.admin.active { display: block; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.header h1 { font-size: 22px; color: #1e3a5f; }
.header button { padding: 8px 16px; background: #ef4444; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
.stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.stat-card { background: #fff; padding: 16px 24px; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); flex: 1; min-width: 120px; }
.stat-card .label { font-size: 13px; color: #888; }
.stat-card .value { font-size: 28px; font-weight: 700; color: #1e40af; }
.filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filters select, .filters input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
th { background: #1e3a5f; color: #fff; padding: 12px; text-align: left; font-size: 14px; white-space: nowrap; }
td { padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
tr:hover td { background: #f8fafc; }
.status-new { color: #dc2626; font-weight: 700; }
.status-contacted { color: #f59e0b; font-weight: 600; }
.status-done { color: #16a34a; }
select.status-select { padding: 4px 8px; border-radius: 4px; border: 1px solid #ddd; font-size: 13px; }
.btn-del { background: #fee2e2; color: #dc2626; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.btn-del:hover { background: #fca5a5; }
.empty { text-align: center; padding: 60px; color: #999; }
.memo-input { width: 100%; min-width: 100px; padding: 4px 8px; border: 1px solid #e5e7eb; border-radius: 4px; font-size: 13px; }
@media (max-width: 768px) {
  .admin { padding: 12px; }
  table { font-size: 13px; }
  th, td { padding: 8px 6px; }
  .filters { flex-direction: column; }
}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h1>퍼시픽링스 관리자</h1>
    <input type="password" id="pwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">로그인</button>
  </div>
</div>

<div class="admin" id="adminPanel">
  <div class="header">
    <h1>안내자료 신청 관리</h1>
    <button onclick="logout()">로그아웃</button>
  </div>
  <div class="stats" id="stats"></div>
  <div class="filters">
    <select id="filterStatus" onchange="renderTable()">
      <option value="">전체 상태</option>
      <option value="new">신규</option>
      <option value="contacted">연락완료</option>
      <option value="done">처리완료</option>
    </select>
    <input type="text" id="filterSearch" placeholder="이름/연락처 검색" oninput="renderTable()">
    <button onclick="loadData()" style="padding:8px 16px;background:#1e40af;color:#fff;border:none;border-radius:6px;cursor:pointer;">새로고침</button>
  </div>
  <div id="tableWrap"></div>
</div>

<script>
const API = '/api/inquiries';
const HEADERS = {
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};
let data = [];

function login() {
  if (document.getElementById('pwInput').value === '1234') {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminPanel').classList.add('active');
    sessionStorage.setItem('admin', '1');
    loadData();
  } else {
    alert('비밀번호가 틀렸습니다.');
  }
}

function logout() {
  sessionStorage.removeItem('admin');
  location.reload();
}

if (sessionStorage.getItem('admin') === '1') {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('adminPanel').classList.add('active');
  loadData();
}

async function loadData() {
  try {
    const res = await fetch(API + '?order=created_at.desc', { headers: { ...HEADERS, 'Prefer': '' } });
    data = await res.json();
    renderStats();
    renderTable();
  } catch (e) {
    console.error(e);
    document.getElementById('tableWrap').innerHTML = '<div class="empty">데이터를 불러올 수 없습니다.</div>';
  }
}

function renderStats() {
  const total = data.length;
  const newCount = data.filter(d => d.status === 'new').length;
  const contacted = data.filter(d => d.status === 'contacted').length;
  const done = data.filter(d => d.status === 'done').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="label">전체</div><div class="value">${total}</div></div>
    <div class="stat-card"><div class="label">신규</div><div class="value" style="color:#dc2626">${newCount}</div></div>
    <div class="stat-card"><div class="label">연락완료</div><div class="value" style="color:#f59e0b">${contacted}</div></div>
    <div class="stat-card"><div class="label">처리완료</div><div class="value" style="color:#16a34a">${done}</div></div>
  `;
}

function renderTable() {
  const status = document.getElementById('filterStatus').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();
  let filtered = data;
  if (status) filtered = filtered.filter(d => d.status === status);
  if (search) filtered = filtered.filter(d =>
    (d.name || '').toLowerCase().includes(search) ||
    (d.phone || '').includes(search)
  );

  if (!filtered.length) {
    document.getElementById('tableWrap').innerHTML = '<div class="empty">신청 내역이 없습니다.</div>';
    return;
  }

  const statusLabels = { new: '신규', contacted: '연락완료', done: '처리완료' };
  const rows = filtered.map(d => {
    const date = new Date(d.created_at).toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    return `<tr>
      <td>${date}</td>
      <td><b>${d.name || '-'}</b></td>
      <td><a href="tel:${d.phone}" style="color:#1e40af">${d.phone || '-'}</a></td>
      <td>${d.product || '-'}</td>
      <td>${d.region || '-'}</td>
      <td>
        <select class="status-select" onchange="updateStatus(${d.id}, this.value)">
          ${['new','contacted','done'].map(s =>
            `<option value="${s}" ${d.status===s?'selected':''}>${statusLabels[s]}</option>`
          ).join('')}
        </select>
      </td>
      <td><input class="memo-input" value="${d.memo||''}" onblur="updateMemo(${d.id}, this.value)" placeholder="메모 입력"></td>
      <td><button class="btn-del" onclick="deleteItem(${d.id})">삭제</button></td>
    </tr>`;
  }).join('');

  document.getElementById('tableWrap').innerHTML = `
    <table>
      <thead><tr><th>신청일시</th><th>이름</th><th>연락처</th><th>관심상품</th><th>선호지역</th><th>상태</th><th>메모</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function updateStatus(id, status) {
  await fetch(API + '?id=eq.' + id, {
    method: 'PATCH',
    headers: HEADERS,
    body: JSON.stringify({ status })
  });
  const item = data.find(d => d.id === id);
  if (item) item.status = status;
  renderStats();
}

async function updateMemo(id, memo) {
  await fetch(API + '?id=eq.' + id, {
    method: 'PATCH',
    headers: HEADERS,
    body: JSON.stringify({ memo })
  });
  const item = data.find(d => d.id === id);
  if (item) item.memo = memo;
}

async function deleteItem(id) {
  if (!confirm('정말 삭제하시겠습니까?')) return;
  await fetch(API + '?id=eq.' + id, { method: 'DELETE', headers: HEADERS });
  data = data.filter(d => d.id !== id);
  renderStats();
  renderTable();
}
</script>
</body>
</html>
