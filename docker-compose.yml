services:
  app:
    build: .
    ports:
      - "3048:3000"
    depends_on:
      - api-server
    restart: unless-stopped

  api-server:
    build: ./server
    environment:
      - ALIGO_API_KEY=${ALIGO_API_KEY}
      - ALIGO_USER_ID=${ALIGO_USER_ID}
      - ALIGO_SENDER=${ALIGO_SENDER}
      - ADMIN_PHONE=${ADMIN_PHONE}
    restart: unless-stopped
