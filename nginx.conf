server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    location = /admin {
        try_files /admin.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/inquiries {
        proxy_pass https://api.hsweb.pics/rest/v1/inquiries;
        proxy_set_header Host api.hsweb.pics;
        proxy_set_header apikey "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNjQxNzY5MjAwLCJleHAiOjE3OTk1MzU2MDB9.pei5Gx1wqEkbcDs1CiHFuTWNuVRlcrG5dPmYdrAqDdY";
        proxy_set_header Authorization "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNjQxNzY5MjAwLCJleHAiOjE3OTk1MzU2MDB9.pei5Gx1wqEkbcDs1CiHFuTWNuVRlcrG5dPmYdrAqDdY";
        proxy_set_header Accept-Profile pacific_links_premium;
        proxy_set_header Content-Profile pacific_links_premium;
        proxy_ssl_server_name on;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Prefer';
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
